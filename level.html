<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current Level - PS Group</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #ffffff;
      color: #111;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    header {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 70px;
      background: #ffffff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 1000;
    }

    .back-link {
      font-size: 16px;
      color: #e63939;
      text-decoration: none;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-link::before { content: "←"; font-size: 20px; }

    .logo { max-height: 48px; width: auto; }

    .container {
      padding: 90px 20px 40px;
      max-width: 480px;
      margin: 0 auto;
      text-align: center;
    }

    h2 {
      font-size: 1.5rem;
      color: #555;
      margin-bottom: 20px;
    }

    /* Slider */
    .slider-wrapper {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      margin: 20px 0;
    }

    .slides-container {
      display: flex;
      transition: transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
      scroll-snap-type: x mandatory;
    }

    .package-card {
      min-width: 100%;
      background: white;
      border-radius: 24px;
      padding: 30px 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      text-align: center;
      scroll-snap-align: center;
    }

    .package-card.active {
      transform: scale(1.05);
      box-shadow: 0 15px 50px rgba(230,57,57,0.25);
      border: 3px solid #e63939;
    }

    .hall-name {
      font-size: 1.4rem;
      font-weight: 600;
      color: #e63939;
      margin-bottom: 8px;
    }

    .level-name {
      font-size: 2.6rem;
      font-weight: 700;
      color: #111;
      margin: 8px 0;
    }

    .package-name {
      font-size: 1.15rem;
      color: #666;
      margin-bottom: 20px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 12px 0;
      font-size: 1.05rem;
      padding: 0 10px;
    }

    .detail-label {
      color: #555;
      font-weight: 500;
    }

    .detail-value {
      font-weight: 600;
      color: #111;
    }

    .status {
      display: inline-block;
      padding: 8px 24px;
      background: #e8f5e9;
      color: #4caf50;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      margin-top: 20px;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 25px 0;
    }

    .dot {
      width: 12px;
      height: 12px;
      background: #ddd;
      border-radius: 50%;
      transition: all 0.3s;
      cursor: pointer;
    }

    .dot.active {
      background: #e63939;
      transform: scale(1.4);
    }

    .empty {
      padding: 60px 20px;
      color: #888;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

<header>
  <a href="home.html" class="back-link">Back to Home</a>
  <img src="logo.png" alt="PS Group Logo" class="logo">
</header>

<div class="container">
  <h2>Your Membership Packages</h2>

  <div class="slider-wrapper">
    <div class="slides-container" id="slidesContainer">
      <!-- JS দিয়ে cards আসবে -->
    </div>
  </div>

  <div class="dots" id="dotsContainer"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>

<script>
// Firebase Config (তোমারটা রাখো)
const firebaseConfig = {
  apiKey: "AIzaSyAWsnuljcbCQgly7fhSh_n9_Q1j1ZtC7rU",
  authDomain: "bdclash-80f60.firebaseapp.com",
  projectId: "bdclash-80f60",
  storageBucket: "bdclash-80f60.firebasestorage.app",
  messagingSenderId: "842550397820",
  appId: "1:842550397820:web:285ed51565a4d71d34b2f9"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentIndex = 0;
let packagesData = [];

// Load Packages
async function loadPackages() {
  const user = auth.currentUser;
  if (!user) {
    document.getElementById("slidesContainer").innerHTML = `<div class="empty">Please login first</div>`;
    return;
  }

  try {
    const userDoc = await db.collection("users").doc(user.uid).get();
    const userData = userDoc.exists ? userDoc.data() : {};
    const activePackage = userData.membership?.packageName || "";

    const snap = await db.collection("packages").orderBy("hall").get();

    packagesData = [];
    const container = document.getElementById("slidesContainer");
    container.innerHTML = "";

    if (snap.empty) {
      container.innerHTML = `<div class="empty">No packages found</div>`;
      return;
    }

    snap.forEach(doc => {
      const pkg = doc.data();
      packagesData.push(pkg);

      const isActive = pkg.name === activePackage;

      const cardHTML = `
        <div class="package-card ${isActive ? 'active' : ''}">
          <div class="hall-name">${pkg.hall || '—'}</div>
          <div class="level-name">${pkg.level || pkg.name}</div>
          <div class="package-name">${pkg.name}</div>

          <div class="detail-row">
            <span class="detail-label">Commission Rate:</span>
            <span class="detail-value">${pkg.commissionRate !== undefined ? pkg.commissionRate + '%' : '—'}</span>
          </div>

          <div class="detail-row">
            <span class="detail-label">Task Count:</span>
            <span class="detail-value">${pkg.taskCount !== undefined ? pkg.taskCount : '—'}</span>
          </div>

          <div class="detail-row">
            <span class="detail-label">Period:</span>
            <span class="detail-value">365 days</span>
          </div>

          ${isActive ? `<div class="status">✓ Currently Active</div>` : ''}
        </div>
      `;
      container.innerHTML += cardHTML;
    });

    createDots();
    updateSlidePosition();

  } catch (err) {
    console.error("Error:", err);
    document.getElementById("slidesContainer").innerHTML = `<div class="empty">Error loading packages</div>`;
  }
}

function createDots() {
  const dotsContainer = document.getElementById("dotsContainer");
  dotsContainer.innerHTML = "";

  packagesData.forEach((_, index) => {
    const dot = document.createElement("div");
    dot.className = `dot ${index === 0 ? 'active' : ''}`;
    dot.onclick = () => {
      currentIndex = index;
      updateSlidePosition();
    };
    dotsContainer.appendChild(dot);
  });
}

function updateSlidePosition() {
  const slides = document.getElementById("slidesContainer");
  slides.style.transform = `translateX(-${currentIndex * 100}%)`;

  document.querySelectorAll('.dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === currentIndex);
  });

  // Optional: active class card-এও আপডেট করতে চাইলে
  document.querySelectorAll('.package-card').forEach((card, i) => {
    card.classList.toggle('active', i === currentIndex);
  });
}

// Auto Slide (optional – চাইলে বন্ধ করতে পারো)
let autoInterval;
function startAutoSlide() {
  clearInterval(autoInterval);
  autoInterval = setInterval(() => {
    currentIndex = (currentIndex + 1) % packagesData.length;
    updateSlidePosition();
  }, 5000); // 5 seconds
}

// Touch Swipe
let touchStartX = 0;
const slidesContainer = document.getElementById("slidesContainer");

slidesContainer.addEventListener("touchstart", e => {
  touchStartX = e.changedTouches[0].screenX;
}, { passive: true });

slidesContainer.addEventListener("touchend", e => {
  const touchEndX = e.changedTouches[0].screenX;
  const diff = touchStartX - touchEndX;

  if (Math.abs(diff) > 60) {
    if (diff > 0) { // left swipe → next
      currentIndex = Math.min(currentIndex + 1, packagesData.length - 1);
    } else { // right swipe → prev
      currentIndex = Math.max(currentIndex - 1, 0);
    }
    updateSlidePosition();
  }
}, { passive: true });

// Init
auth.onAuthStateChanged(user => {
  if (user) {
    loadPackages().then(() => {
      startAutoSlide(); // চাইলে এই লাইন কমেন্ট করে দিতে পারো
    });
  } else {
    window.location.href = "index.html";
  }
});
</script>

</body>
</html>
