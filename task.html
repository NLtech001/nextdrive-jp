<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tasks - PS Group</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Poppins', sans-serif; background: #f8f9fa; color: #111; min-height: 100vh; padding-bottom: 20px; }
    header { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: #ffffff; box-shadow: 0 2px 15px rgba(0,0,0,0.08); display: flex; align-items: center; padding: 0 20px; z-index: 1000; }
    .back-btn { font-size: 28px; color: #333; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
    .header-logo { max-height: 48px; position: absolute; left: 50%; transform: translateX(-50%); }

    .main { padding-top: 90px; padding: 20px; max-width: 480px; margin: 0 auto; }
    .package-header { text-align: center; font-size: 1.6rem; font-weight: 700; margin-bottom: 20px; color: #1a73e8; }

    .stats { display: flex; justify-content: space-around; background: white; padding: 15px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); margin-bottom: 15px; }
    .stat-box { text-align: center; }
    .stat-box h3 { font-size: 1.4rem; font-weight: 700; }
    .stat-box p { font-size: 0.9rem; color: #666; }

    .gift-section { text-align: center; margin: 0 auto 30px; max-width: 320px; }
    .gift-btn {
      padding: 16px 32px;
      font-size: 1.1rem;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #ff6b6b, #ff8e53, #ff6b6b);
      background-size: 200% 200%;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
      transition: all 0.4s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      animation: gradientFlow 6s ease infinite;
    }
    .gift-btn:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 15px 40px rgba(255, 107, 107, 0.6); }
    .gift-btn:disabled {
      background: #aaa;
      cursor: not-allowed;
      animation: none;
      opacity: 0.75;
    }
    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .task-list { display: flex; flex-direction: column; gap: 12px; }

    .task-card {
      background: white; border-radius: 16px; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.06);
      display: flex; justify-content: space-between; align-items: center;
    }
    .task-name { font-weight: 600; font-size: 1.05rem; }

    .complete-btn {
      background: #1a73e8; color: white; border: none; padding: 10px 18px;
      border-radius: 50px; font-weight: 600; cursor: pointer;
    }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .modal-content { background: white; border-radius: 20px; width: 92%; max-width: 420px; max-height: 85vh; overflow-y: auto; padding: 25px; position: relative; }
    .modal-close { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #999; }
    .submit-btn { width: 100%; padding: 16px; background: #e63939; color: white; border: none; border-radius: 50px; font-size: 1.1rem; font-weight: 700; margin-top: 20px; cursor: pointer; }

    .modal-image { max-width: 100%; height: auto; border-radius: 12px; margin: 15px 0; display: block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .modal-detail { margin: 12px 0; font-size: 1rem; }
    .modal-detail strong { color: #1a73e8; }

    .empty-state { text-align: center; padding: 60px 20px; background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
  </style>
</head>
<body>

<header>
  <div class="back-btn" onclick="goBack()">←</div>
  <img src="logo.png" alt="PS Group Logo" class="header-logo">
</header>

<div class="main">
  <div class="package-header" id="currentPackage">Tasks</div>

  <div class="stats">
    <div class="stat-box"><h3 id="balanceDisplay">৳0.00</h3><p>Balance</p></div>
    <div class="stat-box"><h3 id="taskEarningsDisplay">৳0.00</h3><p>Task Earnings</p></div>
    <div class="stat-box"><h3 id="taskCompletedDisplay">0/25</h3><p>Completed / Total</p></div>
  </div>

  <!-- Gift Box Section -->
  <div class="gift-section" id="giftSection" style="display: none;">
    <button id="giftBtn" class="gift-btn" disabled>
      🎁 Claim Gift
    </button>
  </div>

  <div class="task-list" id="taskList"></div>
</div>

<div id="taskModal" class="modal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal()">×</span>
    <h2 id="modalTaskName">Task Name</h2>
    <div id="modalImageContainer" style="text-align:center; display:none;">
      <img id="modalImage" class="modal-image" src="" alt="Task Image">
    </div>
    <p id="modalDescription" style="margin:15px 0; line-height:1.5;"></p>
    <div class="modal-detail"><strong>Car Brand:</strong> <span id="modalCarBrand">N/A</span></div>
    <div class="modal-detail"><strong>Car Rating:</strong> <span id="modalRatings">N/A</span></div>
    <div class="modal-detail"><strong>Service Center:</strong> <span id="modalServiceCenter">N/A</span></div>
    <p style="margin-top:15px; font-size:1.1rem;">
      <strong>Profit:</strong> <span id="modalProfit" style="color:#e63939; font-weight:700;">৳0</span>
    </p>
    <button class="submit-btn" onclick="submitTask()">Submit Task</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAWsnuljcbCQgly7fhSh_n9_Q1j1ZtC7rU",
  authDomain: "bdclash-80f60.firebaseapp.com",
  projectId: "bdclash-80f60",
  storageBucket: "bdclash-80f60.firebasestorage.app",
  messagingSenderId: "842550397820",
  appId: "1:842550397820:web:285ed51565a4d71d34b2f9"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentTaskId = null;
let currentProfit = 0;
let unsubscribeUser = null;
let unsubscribeTasks = null;
let currentGiftConfig = null;

const GIFT_COLLECTION = "giftConfigs";

function goBack() { 
  window.location.href = "collection.html"; 
}

function showMsg(msg) {
  alert(msg);
}

function startListening() {
  const user = auth.currentUser;
  if (!user) return;

  const userRef = db.collection("users").doc(user.uid);

  unsubscribeUser = userRef.onSnapshot(async (doc) => {
    if (!doc.exists) {
      document.getElementById("currentPackage").textContent = "No Account";
      document.getElementById("taskList").innerHTML = '<div class="empty-state">Account not found</div>';
      document.getElementById("giftSection").style.display = "none";
      return;
    }

    const data = doc.data() || {};
    const membership = data.membership || {};

    // Hall & Level নিরাপদে নেওয়া (string হিসেবে)
    const activeHall  = membership.hall  ? String(membership.hall).trim()  : null;
    const activeLevel = membership.level ? String(membership.level).trim() : null;

    let packageText = "No Package Assigned";
    if (activeHall && activeLevel) {
      packageText = `${activeHall} - Level ${activeLevel}`;
    }
    document.getElementById("currentPackage").textContent = packageText;

    // Balance & stats
    document.getElementById("balanceDisplay").textContent = `৳${Number(data.balance || 0).toFixed(2)}`;
    document.getElementById("taskEarningsDisplay").textContent = `৳${Number(data.taskEarnings || 0).toFixed(2)}`;
    const completedCount = Number(data.taskCompletedCount || 0);
    document.getElementById("taskCompletedDisplay").textContent = `${completedCount}/25`;

    // Gift logic — doc ID তৈরি করার সময় String() নিশ্চিত
    const giftSection = document.getElementById("giftSection");
    const giftBtn = document.getElementById("giftBtn");

    giftSection.style.display = "none";
    giftBtn.disabled = true;

    if (activeHall && activeLevel) {
      const configId = `${activeHall}-${String(activeLevel)}`; // নিরাপদ

      try {
        const giftSnap = await db.collection(GIFT_COLLECTION).doc(configId).get();

        if (giftSnap.exists) {
          const g = giftSnap.data();

          if (g.enabled !== false) {
            currentGiftConfig = {
              id: configId,
              amount: Number(g.giftAmount || 0),
              required: Number(g.requiredCompleted || 22)
            };

            if (data.giftClaimedForCurrentPackage === true) {
              // already claimed
            } else if (completedCount >= currentGiftConfig.required) {
              giftSection.style.display = "block";
              giftBtn.disabled = false;
              giftBtn.textContent = `🎁 Claim ৳${currentGiftConfig.amount}`;
              if (currentGiftConfig.amount < 0) {
                giftBtn.textContent += " (Penalty)";
              }
            } else {
              giftSection.style.display = "block";
              giftBtn.disabled = true;
              giftBtn.textContent = `🔒 Need ${currentGiftConfig.required} tasks`;
            }
          }
        }
      } catch (err) {
        console.error("Gift config load error:", err);
      }
    }

    // Tasks loading — hall & level String() দিয়ে নিরাপদ
    if (unsubscribeTasks) unsubscribeTasks();

    let tasksQuery = db.collection("tasks");
    if (activeHall)  tasksQuery = tasksQuery.where("hall", "==", activeHall);
    if (activeLevel) tasksQuery = tasksQuery.where("level", "==", String(activeLevel));

    unsubscribeTasks = tasksQuery.onSnapshot(snap => {
      const taskListEl = document.getElementById("taskList");
      taskListEl.innerHTML = "";

      const completed = data.completedTasks || [];

      if (snap.empty) {
        taskListEl.innerHTML = `
          <div class="empty-state">
            <h3>No tasks available</h3>
            <p>No tasks found for ${activeHall || '—'} - Level ${activeLevel || '—'}</p>
          </div>`;
        return;
      }

      snap.forEach(taskDoc => {
        const task = taskDoc.data();
        const isDone = completed.includes(taskDoc.id);

        const card = document.createElement("div");
        card.className = "task-card";
        card.innerHTML = `
          <div class="task-name">${task.taskName || "Task"}</div>
          ${isDone 
            ? `<span style="color:#28a745; font-weight:600;">✓ Completed</span>` 
            : `<button class="complete-btn" onclick="openTaskModal('${taskDoc.id}', ${Number(task.profit || 0)})">Complete</button>`
          }
        `;
        taskListEl.appendChild(card);
      });
    });
  }, err => {
    console.error("User snapshot error:", err);
  });
}

async function claimGift() {
  const btn = document.getElementById("giftBtn");
  if (btn.disabled || !currentGiftConfig) return;

  btn.disabled = true;
  btn.textContent = "Claiming...";

  const user = auth.currentUser;
  if (!user) return;

  try {
    const userRef = db.collection("users").doc(user.uid);
    const userSnap = await userRef.get();
    const ud = userSnap.data() || {};

    if (ud.giftClaimedForCurrentPackage === true) {
      showMsg("You already claimed this gift!");
      return;
    }

    const amount = currentGiftConfig.amount;
    const newBal = (ud.balance || 0) + amount;
    const newEarn = (ud.earnings || 0) + amount;

    await userRef.update({
      balance: newBal,
      earnings: newEarn,
      giftClaimedForCurrentPackage: true,
      [`giftClaimed_${currentGiftConfig.id}`]: firebase.firestore.FieldValue.serverTimestamp()
    });

    showMsg(`🎉 ৳${amount} Gift claimed!`);
    document.getElementById("giftSection").style.display = "none";

  } catch (err) {
    showMsg("Error claiming gift: " + err.message);
    console.error(err);
  } finally {
    btn.disabled = false;
    if (currentGiftConfig) {
      btn.textContent = `🎁 Claim ৳${currentGiftConfig.amount}`;
    }
  }
}

// ======================
//  Task Modal - Now loads real data
// ======================
async function openTaskModal(taskId, profit) {
  currentTaskId = taskId;
  currentProfit = profit || 0;

  try {
    const taskSnap = await db.collection("tasks").doc(taskId).get();
    if (taskSnap.exists) {
      const task = taskSnap.data();

      document.getElementById("modalTaskName").textContent = task.taskName || "Task";
      document.getElementById("modalDescription").textContent = task.description || "No description available.";
      document.getElementById("modalProfit").textContent = `৳${currentProfit}`;

      // Image
      if (task.imageUrl) {
        document.getElementById("modalImage").src = task.imageUrl;
        document.getElementById("modalImageContainer").style.display = "block";
      } else {
        document.getElementById("modalImageContainer").style.display = "none";
      }

      // Extra fields
      document.getElementById("modalCarBrand").textContent = task.carBrand || "N/A";
      document.getElementById("modalRatings").textContent = task.carRating || "N/A";
      document.getElementById("modalServiceCenter").textContent = task.serviceCenter || "N/A";
    } else {
      showMsg("Task not found");
    }
  } catch (err) {
    console.error("Task load error:", err);
    showMsg("Error loading task details");
  }

  document.getElementById("taskModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("taskModal").style.display = "none";
  currentTaskId = null;
  currentProfit = 0;
}

async function submitTask() {
  if (!currentTaskId) return;

  const user = auth.currentUser;
  if (!user) return;

  try {
    const userRef = db.collection("users").doc(user.uid);
    const profit = currentProfit;

    await userRef.update({
      balance: firebase.firestore.FieldValue.increment(profit),
      earnings: firebase.firestore.FieldValue.increment(profit),
      taskEarnings: firebase.firestore.FieldValue.increment(profit),
      taskCompletedCount: firebase.firestore.FieldValue.increment(1),
      completedTasks: firebase.firestore.FieldValue.arrayUnion(currentTaskId)
    });

    showMsg(`Task completed! +৳${profit}`);
    closeModal();
  } catch (err) {
    showMsg("Error submitting task: " + err.message);
    console.error(err);
  }
}

// ======================
//  Auth & Init
// ======================
auth.onAuthStateChanged(user => {
  if (user) {
    startListening();
    document.getElementById("giftBtn").addEventListener("click", claimGift);
  } else {
    window.location.href = "index.html";
  }
});

window.addEventListener("beforeunload", () => {
  if (unsubscribeUser) unsubscribeUser();
  if (unsubscribeTasks) unsubscribeTasks();
});
</script>

</body>
</html>
