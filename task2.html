<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bronze Free Tasks - PS Group</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Poppins', sans-serif; background: #f8f9fa; color: #111; min-height: 100vh; padding-bottom: 20px; }
    header { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: #ffffff; box-shadow: 0 2px 15px rgba(0,0,0,0.08); display: flex; align-items: center; padding: 0 20px; z-index: 1000; }
    .back-btn { font-size: 28px; color: #333; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
    .header-logo { max-height: 48px; position: absolute; left: 50%; transform: translateX(-50%); }

    .main { padding-top: 90px; padding: 20px; max-width: 480px; margin: 0 auto; }
    .package-header { text-align: center; font-size: 1.6rem; font-weight: 700; margin-bottom: 20px; color: #e63939; }

    .stats { display: flex; justify-content: space-around; background: white; padding: 15px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); margin-bottom: 25px; }
    .stat-box { text-align: center; }
    .stat-box h3 { font-size: 1.4rem; font-weight: 700; }
    .stat-box p { font-size: 0.9rem; color: #666; }

    .task-list { display: flex; flex-direction: column; gap: 12px; }

    .task-card {
      background: white; border-radius: 16px; padding: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.06);
      display: flex; justify-content: space-between; align-items: center;
    }
    .task-name { font-weight: 600; font-size: 1.05rem; }

    .complete-btn {
      background: #1a73e8; color: white; border: none; padding: 10px 18px;
      border-radius: 50px; font-weight: 600; cursor: pointer;
    }

    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .modal-content { background: white; border-radius: 20px; width: 92%; max-width: 420px; max-height: 85vh; overflow-y: auto; padding: 25px; position: relative; }
    .modal-close { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #999; }
    .submit-btn { width: 100%; padding: 16px; background: #e63939; color: white; border: none; border-radius: 50px; font-size: 1.1rem; font-weight: 700; margin-top: 20px; cursor: pointer; }

    .modal-image { max-width: 100%; height: auto; border-radius: 12px; margin: 15px 0; display: block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .modal-detail { margin: 12px 0; font-size: 1rem; }
    .modal-detail strong { color: #1a73e8; }

    .empty-state { text-align: center; padding: 60px 20px; background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
  </style>
</head>
<body>

<header>
  <div class="back-btn" onclick="goBack()">←</div>
  <img src="logo.png" alt="PS Group Logo" class="header-logo">
</header>

<div class="main">
  <div class="package-header" id="currentPackage">Bronze Free Tasks</div>

  <div class="stats">
    <div class="stat-box"><h3 id="totalTasks">0</h3><p>Total Tasks</p></div>
    <div class="stat-box"><h3 id="completedTasks">0</h3><p>Completed</p></div>
  </div>

  <div class="task-list" id="taskList"></div>
</div>

<div id="taskModal" class="modal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal()">×</span>
    
    <h2 id="modalTaskName">Task Name</h2>
    
    <div id="modalImageContainer" style="text-align:center; display:none;">
      <img id="modalImage" class="modal-image" src="" alt="Task Image">
    </div>
    
    <p id="modalDescription" style="margin:15px 0; line-height:1.5;"></p>
    
    <div class="modal-detail"><strong>Car Brand:</strong> <span id="modalCarBrand">N/A</span></div>
    <div class="modal-detail"><strong>Car Rating:</strong> <span id="modalRatings">N/A</span></div>
    <div class="modal-detail"><strong>Service Center:</strong> <span id="modalServiceCenter">N/A</span></div>
    
    <p style="margin-top:15px; font-size:1.1rem;">
      <strong>Profit:</strong> <span id="modalProfit" style="color:#e63939; font-weight:700;">৳0</span>
    </p>

    <button class="submit-btn" onclick="submitTask()">Submit Task</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAWsnuljcbCQgly7fhSh_n9_Q1j1ZtC7rU",
  authDomain: "bdclash-80f60.firebaseapp.com",
  projectId: "bdclash-80f60",
  storageBucket: "bdclash-80f60.firebasestorage.app",
  messagingSenderId: "842550397820",
  appId: "1:842550397820:web:285ed51565a4d71d34b2f9"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentTaskId = null;
let currentProfit = 0;
let unsubscribeUser = null;
let unsubscribeTasks = null;

function goBack() { 
  window.location.href = "collection.html"; 
}

function startListening() {
  const user = auth.currentUser;
  if (!user) return;

  const userRef = db.collection("users").doc(user.uid);

  unsubscribeUser = userRef.onSnapshot(doc => {
    if (!doc.exists) {
      document.getElementById("currentPackage").textContent = "No Account";
      document.getElementById("taskList").innerHTML = '<div class="empty-state">Account not found</div>';
      return;
    }

    // Bronze Free Tasks Page - Fixed Header
    document.getElementById("currentPackage").textContent = "Bronze Free Tasks";

    if (unsubscribeTasks) unsubscribeTasks();

    // 🔥 শুধু Bronze Hall + Free Level এর টাস্ক লোড করবে
    unsubscribeTasks = db.collection("tasks")
      .where("hall", "==", "Bronze Hall")
      .where("level", "==", "Free")
      .onSnapshot(snap => {
        const taskList = document.getElementById("taskList");
        taskList.innerHTML = "";

        document.getElementById("totalTasks").textContent = snap.size;

        const data = doc.data() || {};
        const completedTasks = data.completedTasks || [];
        let completedCount = 0;

        if (snap.empty) {
          taskList.innerHTML = `
            <div class="empty-state">
              <h3>No Bronze Free Tasks</h3>
              <p>Tasks will appear here once added from Task Maker.</p>
            </div>`;
          document.getElementById("completedTasks").textContent = "0";
          return;
        }

        snap.forEach(doc => {
          const task = doc.data();
          const isCompleted = completedTasks.includes(doc.id);
          if (isCompleted) completedCount++;

          const div = document.createElement("div");
          div.className = "task-card";
          div.innerHTML = `
            <div class="task-name">${task.taskName || "Untitled Task"}</div>
            ${isCompleted ? 
              `<span style="color:#4caf50; font-weight:600;">✓ Completed</span>` : 
              `<button class="complete-btn" onclick="openTaskModal('${doc.id}')">
                Complete Task
              </button>`
            }
          `;
          taskList.appendChild(div);
        });

        document.getElementById("completedTasks").textContent = completedCount;
      });
  });
}

async function openTaskModal(taskId) {
  currentTaskId = taskId;

  try {
    const taskDoc = await db.collection("tasks").doc(taskId).get();
    if (!taskDoc.exists) {
      alert("Task not found!");
      return;
    }

    const task = taskDoc.data();
    currentProfit = task.profit || 0;

    document.getElementById("modalTaskName").textContent = task.taskName || "Untitled Task";
    document.getElementById("modalDescription").innerHTML = (task.description || "No description available").replace(/\n/g, '<br>');

    document.getElementById("modalProfit").textContent = "৳" + currentProfit;

    const imgContainer = document.getElementById("modalImageContainer");
    const img = document.getElementById("modalImage");
    if (task.imageUrl && task.imageUrl.trim() !== "") {
      img.src = task.imageUrl;
      imgContainer.style.display = "block";
    } else {
      imgContainer.style.display = "none";
    }

    document.getElementById("modalCarBrand").textContent = task.carBrand || "N/A";
    document.getElementById("modalRatings").textContent = task.carRating ? task.carRating + " ★" : "N/A";
    document.getElementById("modalServiceCenter").textContent = task.serviceCenter || "N/A";

    document.getElementById("taskModal").style.display = "flex";

  } catch (err) {
    console.error(err);
    alert("Error loading task details");
  }
}

function closeModal() {
  document.getElementById("taskModal").style.display = "none";
}

async function submitTask() {
  const user = auth.currentUser;
  if (!user || !currentTaskId) return;

  try {
    const userRef = db.collection("users").doc(user.uid);
    const userDoc = await userRef.get();
    const data = userDoc.data() || {};

    const newBalance = (data.balance || 0) + currentProfit;
    let completed = data.completedTasks || [];
    
    if (!completed.includes(currentTaskId)) {
      completed.push(currentTaskId);
    }

    await userRef.update({
      balance: newBalance,
      completedTasks: completed
    });

    alert(`Task completed!\n৳${currentProfit} added to balance`);
    closeModal();
  } catch (err) {
    alert("Error: " + err.message);
    console.error(err);
  }
}

auth.onAuthStateChanged(user => {
  if (user) {
    startListening();
  } else {
    window.location.href = "index.html";
  }
});

window.addEventListener("beforeunload", () => {
  if (unsubscribeUser) unsubscribeUser();
  if (unsubscribeTasks) unsubscribeTasks();
});
</script>

</body>
</html>
